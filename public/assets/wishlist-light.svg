<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <!-- Vibrant pink/rose gradient for the piggy bank body -->
    <linearGradient id="pigGradientLightNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B8B" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <!-- Warm golden/amber gradient for the coins -->
    <linearGradient id="coinGradientLightNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <!-- Warm sunset peach/orange gradient for the background circle for high visibility -->
    <linearGradient id="bgGradientLightNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5F5" />
      <stop offset="100%" stop-color="#FFE4E6" />
    </linearGradient>
    <!-- Rich drop shadow for realistic premium depth on white background -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#EC4899" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Background Circle with strong borders -->
  <circle cx="120" cy="120" r="100" fill="url(#bgGradientLightNew)" stroke="#FECDD3" stroke-width="2" />
  
  <!-- Piggy Bank Group with Depth Shadow -->
  <g filter="url(#premiumShadow)">
    <!-- Legs (Stronger contrast) -->
    <rect x="85" y="145" width="22" height="26" rx="8" fill="#DB2777" />
    <rect x="133" y="145" width="22" height="26" rx="8" fill="#DB2777" />
    
    <!-- Body -->
    <ellipse cx="120" cy="115" rx="56" ry="46" fill="url(#pigGradientLightNew)" />
    
    <!-- Snout (More defined and cute) -->
    <rect x="166" y="104" width="20" height="22" rx="7" fill="#F43F5E" />
    <circle cx="176" cy="111" r="2.8" fill="#881337" />
    <circle cx="176" cy="119" r="2.8" fill="#881337" />
    
    <!-- Ear (Sharper contrast) -->
    <polygon points="88,82 108,58 114,84" fill="#F43F5E" />
    <polygon points="93,80 106,64 110,81" fill="#FDA4AF" />
    
    <!-- Eye (More lively and cute) -->
    <circle cx="145" cy="99" r="4.5" fill="#1F2937" />
    <circle cx="146.5" cy="97.5" r="1.8" fill="#FFFFFF" />
    
    <!-- Slot -->
    <rect x="108" y="64" width="24" height="6" rx="3" fill="#4B5563" />
  </g>
  
  <!-- Falling Gold Coin (Glowing) -->
  <circle cx="120" cy="44" r="16" fill="url(#coinGradientLightNew)" filter="drop-shadow(0px 4px 8px rgba(245, 158, 11, 0.4))" />
  <circle cx="120" cy="44" r="11" fill="none" stroke="#FFFFFF" stroke-width="2" />
  
  <!-- Sparkling Stars (High Contrast) -->
  <path d="M53,74 L57,70 L53,66 L49,70 Z" fill="#D97706" />
  <path d="M187,74 L191,70 L187,66 L183,70 Z" fill="#D97706" />
  <circle cx="63" cy="148" r="5" fill="#F43F5E" />
  <circle cx="177" cy="148" r="6" fill="#EC4899" />
</svg>
