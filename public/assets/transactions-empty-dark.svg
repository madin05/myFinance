<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="docGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E152A" />
      <stop offset="100%" stop-color="#120A1C" />
    </linearGradient>
    <linearGradient id="accentGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="80" cy="80" r="60" fill="#150E22" stroke="#25163D" stroke-width="1.5" />
  
  <!-- Empty Document Shape -->
  <rect x="55" y="45" width="50" height="70" rx="8" fill="url(#docGradDark)" stroke="#4C1D95" stroke-width="2" />
  
  <!-- Lines in document representing text -->
  <line x1="67" y1="65" x2="93" y2="65" stroke="#EC4899" stroke-width="3" stroke-linecap="round" />
  <line x1="67" y1="77" x2="85" y2="77" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" />
  <line x1="67" y1="89" x2="91" y2="89" stroke="#2E1065" stroke-width="3" stroke-linecap="round" />
  
  <!-- Magnifying glass or receipt symbol -->
  <circle cx="95" cy="95" r="14" fill="#1E152A" stroke="url(#accentGradDark)" stroke-width="3" />
  <line x1="105" y1="105" x2="115" y2="115" stroke="url(#accentGradDark)" stroke-width="4" stroke-linecap="round" />
</svg>
