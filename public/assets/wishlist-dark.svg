<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="pigGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="coinGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="bgGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E1065" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.4" />
    </linearGradient>
    <filter id="glowDark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#8B5CF6" flood-opacity="0.4" />
    </filter>
  </defs>
  <!-- Background Circle -->
  <circle cx="120" cy="120" r="100" fill="url(#bgGradientDark)" stroke="#3B0764" stroke-width="1.5" />
  <!-- Piggy Bank Body -->
  <g filter="url(#glowDark)">
    <!-- Legs -->
    <rect x="85" y="145" width="20" height="25" rx="8" fill="#7C3AED" />
    <rect x="135" y="145" width="20" height="25" rx="8" fill="#7C3AED" />
    <!-- Body -->
    <ellipse cx="120" cy="115" rx="55" ry="45" fill="url(#pigGradientDark)" />
    <!-- Snout -->
    <rect x="165" y="105" width="20" height="20" rx="6" fill="#D946EF" />
    <circle cx="175" cy="111" r="2.5" fill="#4A044E" />
    <circle cx="175" cy="119" r="2.5" fill="#4A044E" />
    <!-- Ear -->
    <polygon points="90,80 110,60 115,85" fill="#D946EF" stroke-width="0" />
    <!-- Eye -->
    <circle cx="145" cy="100" r="3.5" fill="#FDF4FF" />
    <circle cx="146.5" cy="98.5" r="1.2" fill="#000000" />
    <!-- Slot -->
    <rect x="110" y="65" width="20" height="5" rx="2.5" fill="#1E1B4B" />
  </g>
  <!-- Falling Coin -->
  <circle cx="120" cy="45" r="15" fill="url(#coinGradientDark)" filter="drop-shadow(0px 0px 8px rgba(245, 158, 11, 0.6))" />
  <circle cx="120" cy="45" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.5" />
  <!-- Small Sparkles -->
  <path d="M55,75 L59,71 L55,67 L51,71 Z" fill="#FBBF24" filter="drop-shadow(0px 0px 4px rgba(251, 191, 36, 0.8))" />
  <path d="M190,75 L194,71 L190,67 L186,71 Z" fill="#FBBF24" filter="drop-shadow(0px 0px 4px rgba(251, 191, 36, 0.8))" />
  <circle cx="65" cy="150" r="4" fill="#D946EF" />
  <circle cx="180" cy="150" r="5" fill="#8B5CF6" />
</svg>
