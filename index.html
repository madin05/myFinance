<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Finance Dashboard [FIXED]</title>
    <link rel="icon" type="image/svg+xml" href="/assets/logo-navbar-light.svg" />
    <script>
      // Apply saved theme ASAP to avoid flash / resetting on refresh.
      try {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch {}
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Sortable JS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    
    <!-- Login View -->
    <div id="login-view" style="display: none;"></div>

    <!-- Main Dashboard Layout -->
    <div class="dashboard-container" id="app-layout" style="display: none;">
      
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo-container">
          <label class="hamburger mobile-only" id="btn-close-sidebar">
            <input type="checkbox" class="sidebar-checkbox" />
            <svg viewBox="0 0 32 32">
              <path
                class="line line-top-bottom"
                d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"
              ></path>
              <path class="line" d="M7 16 27 16"></path>
            </svg>
          </label>
          <button class="icon-btn" id="btn-toggle-sidebar"><i class="ph ph-list"></i></button>
            <a href="#dashboard" class="logo-wrapper" style="text-decoration: none;">
              <div class="logo-icon">
                <img src="/assets/logo-navbar-light.svg" class="logo-light" alt="MyFinance">
                <img src="/assets/logo-navbar-dark.svg" class="logo-dark" alt="MyFinance">
              </div>
            </a>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav">
          <a href="#dashboard" class="nav-item" data-route="dashboard" data-tooltip-right="Dashboard">
            <i class="ph ph-squares-four"></i>
            <span>Dashboard</span>
          </a>
          <a href="#transaksi" class="nav-item" data-route="transaksi" data-tooltip-right="Transaksi">
            <i class="ph ph-receipt"></i>
            <span>Transaksi</span>
          </a>
          <a href="#anggaran" class="nav-item" data-route="anggaran" data-tooltip-right="Atur Anggaran">
            <i class="ph ph-chart-pie-slice"></i>
            <span>Anggaran</span>
          </a>
          <a href="#tabungan" class="nav-item" data-route="tabungan" data-tooltip-right="Wishlist">
            <i class="ph ph-heart"></i>
            <span>Wishlist</span>
          </a>
          <a href="#laporan" class="nav-item" data-route="laporan" data-tooltip-right="Laporan Keuangan">
            <i class="ph ph-chart-bar"></i>
            <span>Laporan</span>
          </a>
          <a href="#akun" class="nav-item" data-route="akun" data-tooltip-right="Profil Saya">
            <i class="ph ph-user"></i>
            <span>Akun</span>
          </a>
        </nav>

        <!-- Sidebar Footer Removed for FAM -->
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Header -->
        <header class="header">
          <label class="hamburger mobile-only" id="btn-open-sidebar-mobile">
            <input type="checkbox" class="sidebar-checkbox" />
            <svg viewBox="0 0 32 32">
              <path
                class="line line-top-bottom"
                d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"
              ></path>
              <path class="line" d="M7 16 27 16"></path>
            </svg>
          </label>
          <div class="search-bar">
            <i class="ph ph-magnifying-glass search-icon"></i>
            <input type="text" id="global-search" placeholder="Cari transaksi..." />
          </div>

          <div class="header-actions">
            <label for="themeToggle" class="themeToggle st-sunMoonThemeToggleBtn" title="Ganti Tema">
              <input type="checkbox" id="themeToggle" class="themeToggleInput" />
              <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" stroke="none">
                <mask id="moon-mask">
                  <rect x="0" y="0" width="20" height="20" fill="white"></rect>
                  <circle cx="11" cy="3" r="8" fill="black"></circle>
                </mask>
                <circle class="sunMoon" cx="10" cy="10" r="8" mask="url(#moon-mask)"></circle>
                <g>
                  <circle class="sunRay sunRay1" cx="18" cy="10" r="1.5"></circle>
                  <circle class="sunRay sunRay2" cx="14" cy="16.928" r="1.5"></circle>
                  <circle class="sunRay sunRay3" cx="6" cy="16.928" r="1.5"></circle>
                  <circle class="sunRay sunRay4" cx="2" cy="10" r="1.5"></circle>
                  <circle class="sunRay sunRay5" cx="6" cy="3.1718" r="1.5"></circle>
                  <circle class="sunRay sunRay6" cx="14" cy="3.1718" r="1.5"></circle>
                </g>
              </svg>
            </label>
            <button class="icon-btn"><i class="ph-fill ph-bell"></i></button>
            <div class="user-profile" id="user-profile-trigger">
              <div class="avatar-wrapper skeleton skeleton-circle" style="width: 44px; height: 44px;">
                <img id="user-avatar" src="" alt="User" style="opacity: 0; transition: opacity 0.3s; width: 100%; height: 100%; border-radius: 50%;" />
              </div>
              <div class="profile-dropdown" id="profile-dropdown">
                <div class="dropdown-header">
                  <p class="user-name skeleton skeleton-text" id="nav-user-name"></p>
                  <p class="user-email text-sm text-muted skeleton skeleton-text" id="nav-user-email"></p>
                </div>
                <div class="dropdown-divider"></div>
                <a href="#akun" class="dropdown-item">
                  <i class="ph ph-user"></i> Profil Saya
                </a>
                <a href="#laporan" class="dropdown-item">
                  <i class="ph ph-chart-bar"></i> Laporan
                </a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item text-red" id="btn-logout">
                  <i class="ph ph-sign-out"></i> Logout
                </button>
              </div>
            </div>
          </div>
        </header>
        <main class="page-content" id="page-content">
        <!-- Initial Skeleton for fast loading appearance -->
        <div class="skeleton-wrapper" style="padding: 1.5rem;">
          <div class="skeleton" style="height: 40px; width: 40%; margin-bottom: 2.5rem; border-radius: 8px;"></div>
          
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
            <!-- Left Skeleton (Profile Style) -->
            <div class="stat-card" style="padding: 2.5rem 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
              <div class="skeleton" style="width: 120px; height: 120px; border-radius: 50%;"></div>
              <div class="skeleton" style="width: 60%; height: 24px; border-radius: 6px;"></div>
              <div class="skeleton" style="width: 40%; height: 16px; border-radius: 4px;"></div>
              <div class="skeleton" style="width: 80%; height: 40px; border-radius: 100px; margin-top: 1rem;"></div>
            </div>
            
            <!-- Right Skeleton (Form Style) -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
              <div class="stat-card" style="padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="skeleton" style="width: 30%; height: 20px; border-radius: 4px;"></div>
                <div class="skeleton" style="width: 100%; height: 48px; border-radius: 12px;"></div>
                <div class="skeleton" style="width: 100%; height: 48px; border-radius: 12px;"></div>
                <div class="skeleton" style="width: 40%; height: 44px; border-radius: 10px; align-self: flex-end;"></div>
              </div>
              <div class="stat-card" style="padding: 1.5rem; height: 100px;">
                <div class="skeleton" style="width: 50%; height: 20px; border-radius: 4px; margin-bottom: 1rem;"></div>
                <div class="skeleton" style="width: 100%; height: 40px; border-radius: 8px; margin-top: 10px;"></div>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Floating Action Menu (FAM) -->
      <aside class="menu-tooltip-container">
        <input type="checkbox" id="fam-toggle" />
        <label for="fam-toggle" class="fam-trigger">
          <i class="ph-bold ph-plus"></i>
        </label>
        
        <div class="fam-item" style="--i: 1">
          <button class="fam-anchor bg-primary" id="btn-fam-add-tx" data-tooltip-left="Tambah Transaksi">
            <i class="ph-fill ph-receipt"></i>
          </button>
        </div>
        <div class="fam-item" style="--i: 0">
          <button class="fam-anchor bg-pink" id="btn-fam-wishlist" data-tooltip-top="Ke Wishlist">
            <i class="ph-fill ph-heart"></i>
          </button>
        </div>
        <div class="fam-item" style="--i: 2" hidden></div>
        <div class="fam-item" style="--i: 3" hidden></div>
        <div class="fam-item" style="--i: 4" hidden></div>
        <div class="fam-item" style="--i: 5" hidden></div>
        <div class="fam-item" style="--i: 6" hidden></div>
        <div class="fam-item" style="--i: 7" hidden></div>
      </aside>

      <div id="modal-container"></div>
    </div> <!-- End of #app-layout -->

    <!-- Global Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
      <div class="loading-content">
        <video src="/assets/coin.webm" autoplay loop muted playsinline width="180" height="180"></video>
        <p>Sedang memproses...</p>
      </div>
    </div>

    <script type="module" src="/src/main.js?v=final"></script>
  </body>
</html>
